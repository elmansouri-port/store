<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rainbow - Client Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd', 400: '#a78bfa', 500: '#7c3aed', 600: '#6d28d9', 700: '#5b21b6' }, navy: { 900: '#1e1b4b', 800: '#312e81', 700: '#3730a3' }
                    },
                    borderRadius: { btn: '10px' }, fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .glass-input { border: 1px solid #e5e7eb; background: #fff; transition: border-color 0.2s, box-shadow 0.2s; }
        .glass-input:focus-within { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,0.12); }
        .fade-in-up { animation: fadeIn 0.5s ease-out forwards; opacity: 0; transform: translateY(12px); }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
        .delay-5 { animation-delay: 0.5s; }
        .delay-6 { animation-delay: 0.6s; }
        .delay-7 { animation-delay: 0.7s; }
        .delay-8 { animation-delay: 0.8s; }
        .delay-9 { animation-delay: 0.9s; }
    </style>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-white min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-lg">
        <div class="flex flex-col gap-6">
            <!-- Logo -->
            <div class="text-center fade-in-up delay-1">
                <a href="/" class="inline-flex items-center gap-2.5">
                    <img src="/images/rainbow-logo.png" alt="Rainbow" class="h-16 w-auto" />
                </a>
            </div>

            <h1 class="fade-in-up delay-1 text-center text-4xl md:text-5xl font-bold tracking-tight text-gray-900">
                Welcome back
            </h1>
            <p class="fade-in-up delay-2 text-center text-lg text-gray-500">Sign in to your account to continue</p>

            <!-- Message box -->
            <div id="message-box" class="fade-in-up hidden p-4 rounded-btn text-sm font-medium leading-relaxed" role="alert"></div>

            <!-- ===== LOGIN FORM ===== -->
            <div id="form-login">
                <form onsubmit="handleLogin(event)" class="space-y-5">
                    <div class="fade-in-up delay-3">
                        <label class="text-base font-medium text-gray-500">Email Address</label>
                        <div class="glass-input rounded-btn p-0.5 mt-1">
                            <input id="login-email" name="email" type="email" required placeholder="you@company.com" class="w-full bg-transparent text-base px-4 py-4 rounded-btn focus:outline-none text-gray-900 placeholder-gray-400" />
                        </div>
                    </div>
                    <div class="fade-in-up delay-4">
                        <label class="text-base font-medium text-gray-500">Password</label>
                        <div class="glass-input rounded-btn p-0.5 mt-1">
                            <div class="relative">
                                <input id="login-password" name="password" type="password" required placeholder="Enter your password" class="w-full bg-transparent text-base px-4 py-4 pr-12 rounded-btn focus:outline-none text-gray-900 placeholder-gray-400" />
                                <button type="button" onclick="togglePassword('login-password', this)" class="absolute inset-y-0 right-3 flex items-center text-gray-400 hover:text-gray-600 transition-colors">
                                    <svg class="eye-on w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                                    <svg class="eye-off w-5 h-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/></svg>
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="fade-in-up delay-5 flex items-center justify-between text-base">
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input id="remember-me" name="rememberMe" type="checkbox" class="rounded border-gray-300 text-brand-500 focus:ring-brand-500" />
                            <span class="text-gray-600">Keep me signed in</span>
                        </label>
                        <button type="button" onclick="showForgotPassword()" class="hover:underline text-brand-500 transition-colors">Reset password</button>
                    </div>
                    <button id="btn-login" type="submit" class="fade-in-up delay-6 w-full rounded-btn py-4 font-semibold text-white bg-brand-500 hover:bg-brand-600 transition-colors text-base shadow-md">Sign In</button>
                </form>

                <p class="fade-in-up delay-7 text-center text-base text-gray-500 mt-6">
                    New to our platform? <a href="/register" class="text-brand-500 hover:underline transition-colors font-semibold">Create Account</a>
                </p>
            </div>

            <!-- ===== FORGOT PASSWORD ===== -->
            <div id="form-forgot" class="hidden">
                <form onsubmit="handleForgotPassword(event)" class="space-y-5">
                    <p class="text-base text-gray-500">Enter your email and we'll send you a link to reset your password.</p>
                    <div>
                        <label class="text-base font-medium text-gray-500">Email Address</label>
                        <div class="glass-input rounded-btn p-0.5 mt-1">
                            <input id="forgot-email" name="email" type="email" required placeholder="you@company.com" class="w-full bg-transparent text-base px-4 py-4 rounded-btn focus:outline-none text-gray-900 placeholder-gray-400" />
                        </div>
                    </div>
                    <button id="btn-forgot" type="submit" class="w-full rounded-btn py-4 font-semibold text-white bg-brand-500 hover:bg-brand-600 transition-colors text-base shadow-md">Send reset link</button>
                    <button type="button" onclick="hideForgotPassword()" class="w-full text-center text-base text-brand-500 hover:underline transition-colors font-medium">Back to sign in</button>
                </form>
            </div>

            <p class="text-center text-sm text-gray-400 mt-4">&copy; 2026 Rainbow by Alcatel-Lucent Enterprise. All rights reserved.</p>
        </div>
    </div>

    <script src="/js/i18n.js"></script>
    <script>
    function hideMessage() {
        var mb = document.getElementById('message-box');
        mb.classList.add('hidden');
        mb.textContent = '';
        mb.className = 'hidden p-4 rounded-btn text-sm font-medium leading-relaxed';
    }

    function showMessage(text, type) {
        var mb = document.getElementById('message-box');
        mb.textContent = text;
        mb.className = 'block p-4 rounded-btn text-sm font-medium leading-relaxed fade-in ' + (type === 'error' ? 'bg-red-50 text-red-700' : 'bg-green-50 text-green-700');
    }

    // ===== PASSWORD TOGGLE =====
    function togglePassword(inputId, btn) {
        var input = document.getElementById(inputId);
        if (input.type === 'password') {
            input.type = 'text';
            btn.querySelector('.eye-on').classList.add('hidden');
            btn.querySelector('.eye-off').classList.remove('hidden');
        } else {
            input.type = 'password';
            btn.querySelector('.eye-on').classList.remove('hidden');
            btn.querySelector('.eye-off').classList.add('hidden');
        }
    }

    // ===== FORGOT PASSWORD =====
    function showForgotPassword() {
        hideMessage();
        document.getElementById('form-login').classList.add('hidden');
        document.getElementById('form-forgot').classList.remove('hidden');
    }

    function hideForgotPassword() {
        hideMessage();
        document.getElementById('form-forgot').classList.add('hidden');
        document.getElementById('form-login').classList.remove('hidden');
    }

    // ===== API HELPERS =====
    var API_BASE = window.location.origin;

    function apiRequest(method, path, body) {
        return fetch(API_BASE + path, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: body ? JSON.stringify(body) : undefined
        }).then(function(r) {
            return r.json().then(function(data) {
                if (!r.ok) throw new Error(data.error || data.message || 'Request failed');
                return data;
            });
        });
    }

    // ===== LOGIN =====
    function handleLogin(e) {
        e.preventDefault();
        hideMessage();
        var btn = document.getElementById('btn-login');
        btn.disabled = true;
        btn.textContent = 'Signing in...';
        var email = document.getElementById('login-email').value.trim();
        var password = document.getElementById('login-password').value;
        apiRequest('POST', '/api/client/login', { email: email, password: password }).then(function(data) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('client', JSON.stringify(data.user));
            setTimeout(function() {
                var redirect = '/portal';
                window.location.href = redirect;
            }, 500);
        }).catch(function(err) {
            showMessage(err.message, 'error');
            btn.disabled = false;
            btn.textContent = 'Sign In';
        });
    }

    // ===== FORGOT PASSWORD =====
    function handleForgotPassword(e) {
        e.preventDefault();
        hideMessage();
        var btn = document.getElementById('btn-forgot');
        btn.disabled = true;
        btn.textContent = 'Sending...';
        var email = document.getElementById('forgot-email').value.trim();
        apiRequest('POST', '/api/client/forgot-password', { email: email }).then(function() {
            showMessage('If an account exists with that email, you will receive a password reset link shortly.', 'success');
        }).catch(function() {
            showMessage('If an account exists with that email, you will receive a password reset link shortly.', 'success');
        }).finally(function() {
            btn.disabled = false;
            btn.textContent = 'Send reset link';
        });
    }

    // ===== URL PARAMS =====
    (function() {
        if (localStorage.getItem('token')) {
            window.location.href = '/portal';
            return;
        }
    })();
    </script>
</body>
</html>
